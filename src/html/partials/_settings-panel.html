<!-- ========================== Settings Panel start ==================================== -->
<div class="settings-panel position-fixed top-50 translate-middle-y tw-z-999 d-flex align-items-center">
  <button type="button"
    class="settings-button tw-w-12 tw-h-12 bg-main-600 text-white hover-bg-main-two-600 tw-duration-100 d-flex justify-content-center align-items-center">
    <i class="ph-fill ph-gear-six setting-icon tw-text-2xl tw-leading-none animation-rotate tw-w-6 tw-h-6"></i>
    <i class="ph-bold ph-x close-icon tw-text-2xl tw-leading-none tw-w-6 tw-h-6"></i>
  </button>
  
  <div class="settings-panel__content bg-white tw-px-6 tw-py-13 d-flex flex-column tw-gap-10 scroll-sm overflow-y-auto">
    <div class="d-flex flex-column tw-gap-10">
      <div class="">
        <h6 class="settings-panel__title text-center tw-mb-6 text-uppercase">
          Cursor
        </h6>
        <div class="settings-panel__buttons cursor__buttons d-flex tw-gap-4">
          <button type="button"
            class="settings-panel__button cursor-animate btn bg-main-two-600 hover-bg-animation hover-bg-animation-main-600 tw-px-3 tw-py-305 flex-grow-1 rounded-0 active">
            <span class="btn-text">Animate </span>
          </button>
          <button type="button"
            class="settings-panel__button cursor-default btn bg-main-two-600 hover-bg-animation hover-bg-animation-main-600 tw-px-3 tw-py-305 flex-grow-1 rounded-0">
            <span class="btn-text">Default </span>
          </button>
        </div>
      </div>
      <div class="">
        <h6 class="settings-panel__title text-center tw-mb-6 text-uppercase">
          Direction
        </h6>
        <div class="settings-panel__buttons d-flex tw-gap-4">
          <button type="button"
            class="settings-panel__button direction-ltr btn bg-main-two-600 hover-bg-animation hover-bg-animation-main-600 tw-px-3 tw-py-305 flex-grow-1 rounded-0 active">
            <span class="btn-text">LTR </span>
          </button>
          <button type="button"
            class="settings-panel__button direction-rtl btn bg-main-two-600 hover-bg-animation hover-bg-animation-main-600 tw-px-3 tw-py-305 flex-grow-1 rounded-0">
            <span class="btn-text">RTL </span>
          </button>

        </div>
      </div>
    </div>
  </div>
</div>
<!-- ========================== Settings Panel end ==================================== -->
